  <meta charset="UTF-8">

  <title>Firebase 连接测试</title>

    body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
    .success { color: green; }
    .error { color: red; }
    .info { color: blue; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
    button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>

<body>
  <h1>🔥 Firebase 连接测试</h1>
  
  <div id="test-results">
    <p class="info">正在初始化...</p>
  </div>
  
  <hr>
  
  <h2>测试操作</h2>
  <button onclick="testWrite()">测试写入数据</button>
  <button onclick="testRead()">测试读取数据</button>
  <button onclick="testListen()">测试实时监听</button>
  <button onclick="clearData()">清空测试数据</button>
  
  <hr>
  
  <h2>控制台日志</h2>
  <pre id="console-log"></pre>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD1FBBpxi9MrQ2nCLfPWHzzdjKH1KjtAkA",
      authDomain: "jinduluopan.firebaseapp.com",
      projectId: "jinduluopan",
      storageBucket: "jinduluopan.firebasestorage.app",
      messagingSenderId: "202428312979",
      appId: "1:202428312979:web:ff72e8ea64ded03ff94c66",
      measurementId: "G-E0HHKY4NK1"
    };

    let app;
    let db;
    let unsubscribe;

    function log(message, type = 'info') {
      const logDiv = document.getElementById('console-log');
      const time = new Date().toLocaleTimeString();
      logDiv.textContent += `[${time}] ${message}\n`;
      console.log(message);
    }

    function updateResults(html) {
      document.getElementById('test-results').innerHTML = html;
    }

    async function init() {
      try {
        log('正在初始化 Firebase...');
        app = firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        log('✅ Firebase 初始化成功！', 'success');
        
        updateResults(`
          <p class="success">✅ Firebase 应用初始化成功！</p>
          <p><strong>项目 ID:</strong> ${firebaseConfig.projectId}</p>
        `);
        
        // 尝试简单的读取来测试连接
        log('尝试测试 Firestore 连接...');
        const testDoc = db.collection('test').doc('connection-test');
        await testDoc.set({
          test: true,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        log('✅ Firestore 写入测试成功！', 'success');
        
        await testDoc.get();
        log('✅ Firestore 读取测试成功！', 'success');
        
        updateResults(`
          <p class="success">✅ Firebase 完全正常！</p>
          <p><strong>项目:</strong> ${firebaseConfig.projectId}</p>
          <p><strong>状态:</strong> Firestore 连接成功！</p>
        `);
        
      } catch (error) {
        log('❌ Firebase 连接失败: ' + error, 'error');
        console.error(error);
        updateResults(`
          <p class="error">❌ Firebase 连接失败</p>
          <p><strong>错误:</strong> ${error.message || error}</p>
          <p><strong>建议:</strong> 检查 Firestore 是否已创建，安全规则是否正确</p>
        `);
      }
    }

    async function testWrite() {
      try {
        log('正在写入测试数据...');
        const testData = {
          message: '测试数据 ' + Date.now(),
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        const docRef = await db.collection('test-data').add(testData);
        log('✅ 数据写入成功！文档 ID: ' + docRef.id, 'success');
      } catch (error) {
        log('❌ 数据写入失败: ' + error, 'error');
      }
    }

      try {
        log('正在读取测试数据...');
        const snapshot = await db.collection('test-data').get();
        log('✅ 数据读取成功！共 ' + snapshot.size + ' 条', 'success');
        snapshot.forEach(doc => {
          log(' - ' + doc.id + ': ' + JSON.stringify(doc.data()));
        });
